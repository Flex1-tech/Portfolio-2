services:
 - type: web
 name: portfolio-backend
 env: node
 buildCommand: npm install && npm run build
 startCommand: npm start
 envVars:
 - key: NODE_ENV
 value: production
 - key: PORT
 value: 5000
 - key: SESSION_SECRET
 generateValue: true
 - key: CORS_ORIGIN
 value: https://seth-akplogan.onrender.com
 disk:
 name: data
 mountPath: /opt/render/project/data
 sizeGB: 1
